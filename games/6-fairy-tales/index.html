<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("../sw.js", { scope: "/games/" })
            .then(function (reg) {
                if (reg.installing && !navigator.serviceWorker.controller) {
                    reg.installing.addEventListener("statechange", function () {
                        if (this.state === "activated") location.reload();
                    });
                }
            });
    }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Fireboy &amp; Watergirl 6 Fairy Tales</title>
    <link rel="icon" sizes="60x60" href="../../img/icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        .game-ui-btn {
            position: fixed;
            z-index: 9999;
            padding: 6px 10px;
            font-size: 13px;
            background: rgba(0,0,0,0.55);
            color: rgba(255,255,255,0.5);
            border: none;
            cursor: pointer;
            user-select: none;
            font-family: sans-serif;
            text-decoration: none;
            transition: background 0.2s;
        }
        .game-ui-btn:hover { background: rgba(0,0,0,0.8); color: #fff; }
        #btn-back { left: 0; top: 0; border-radius: 0 0 6px 0; }
        #btn-fullscreen { right: 0; top: 0; border-radius: 0 0 0 6px; display: none; }
    </style>
</head>
<body>
    <script>

    <div id="root">
        <div id="container"></div>
        <div id="hammer"></div>
    </div>

    <a id="btn-back" class="game-ui-btn" href="../../">&#8592; Menu</a>
    <button id="btn-fullscreen" class="game-ui-btn" onclick="document.documentElement.requestFullscreen()">Fullscreen</button>

    <script>
    function addScript(src, buster, callback) {
        var s = document.createElement('script');
        s.setAttribute('src', src + '?v=' + buster);
        if (typeof callback === 'function') {
            s.onload = callback;
        }
        document.body.appendChild(s);
    }
    addScript('version.js', Date.now(), function() {
        require(['game.js?vvvv=14&v=' + version]);
    });
    </script>

    <script src="../lib/touch-controls.js"></script>
</body>
</html>
